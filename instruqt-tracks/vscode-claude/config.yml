version: "3"
containers:
- name: workstation
  image: gcr.io/instruqt/vscode-claude:latest
  cmd: code-server workspace /app --user-data-dir /user-data --auth none --disable-telemetry
  shell: /bin/bash
  ports:
  - 8080
  memory: 2048
aws_accounts:
- name: bedrock
  services:
  - bedrock
  regions:
  - us-east-1
  - us-east-2
  - us-west-1
  - us-west-2
  - ca-central-1
  - ca-west-1
  managed_policies:
  - arn:aws:iam::aws:policy/AmazonBedrockLimitedAccess
