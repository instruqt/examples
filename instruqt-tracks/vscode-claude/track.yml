slug: vscode-claude
title: VSCode with Claude
teaser: Use VSCode with Claude Code connected to AWS Bedrock
description: |-
  Learn how to use Instruqt cloud accounts to enable AI coding agents in a hands-on lab environment.
  This track uses AWS Bedrock to power Claude Code inside VSCode — no Claude subscription required.

  **This track demonstrates how to:**
  - Configure AWS Bedrock as the AI backend for Claude Code
  - Use a cloud-hosted VSCode IDE with Claude Code pre-installed
  - Leverage Instruqt cloud accounts to provide AWS credentials automatically

  **Container image:**
  This track uses a pre-built VSCode container available at `gcr.io/instruqt/vscode-claude`.
  Source: https://github.com/instruqt/docker-vscode-claude
icon: ./assets/claude.svg
